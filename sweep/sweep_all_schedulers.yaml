# OSLTT Sweep Configuration — All CachyOS scx schedulers
# Tests every scx scheduler shipped in CachyOS with lowlatency mode where available.
#
# scxctl modes: auto, gaming, lowlatency, powersave, server
#
# Usage:
#   python3 sweep_runner.py sweep_all_schedulers.yaml
#   python3 sweep_runner.py sweep_all_schedulers.yaml --dry-run
#   python3 sweep_runner.py sweep_all_schedulers.yaml --resume

game: kovaaks
device: /dev/ttyACM0
repeats: 3

osltt:
  shots: 100
  delay_ms: 10
  move_px: 100
  window_ms: 20
  threshold: 0        # 0 = auto (fixed 200 ADC units offset)

# ─── Runs ─────────────────────────────────────────────────────────────────────
# Fields:
#   name:       Label for the run
#   scheduler:  Scheduler name without scx_ prefix (lavd, bpfland, rusty, etc.)
#               'none' = stop scx, revert to kernel EEVDF
#   mode:       scxctl mode (auto, gaming, lowlatency, powersave, server)
#   args:       Extra CLI args for the scheduler binary (comma-separated, optional)
#   governor:   CPU governor (performance, powersave, etc.)

runs:
  # ── Baseline: kernel EEVDF (no scx) ──
  - name: eevdf_performance
    scheduler: none
    governor: performance

  - name: eevdf_powersave
    scheduler: none
    governor: powersave

  # ── scx_lavd ──
  - name: lavd_auto
    scheduler: lavd
    mode: auto
    governor: performance

  - name: lavd_gaming
    scheduler: lavd
    mode: gaming
    governor: performance

  - name: lavd_lowlatency
    scheduler: lavd
    mode: lowlatency
    governor: performance

  # ── scx_bpfland ──
  - name: bpfland_auto
    scheduler: bpfland
    mode: auto
    governor: performance

  - name: bpfland_gaming
    scheduler: bpfland
    mode: gaming
    governor: performance

  - name: bpfland_lowlatency
    scheduler: bpfland
    mode: lowlatency
    governor: performance

  # ── scx_rusty ──
  - name: rusty_auto
    scheduler: rusty
    mode: auto
    governor: performance

  - name: rusty_gaming
    scheduler: rusty
    mode: gaming
    governor: performance

  - name: rusty_lowlatency
    scheduler: rusty
    mode: lowlatency
    governor: performance

  # ── scx_flash ──
  - name: flash_auto
    scheduler: flash
    mode: auto
    governor: performance

  - name: flash_lowlatency
    scheduler: flash
    mode: lowlatency
    governor: performance

  # ── scx_beerland ──
  - name: beerland_auto
    scheduler: beerland
    mode: auto
    governor: performance

  - name: beerland_lowlatency
    scheduler: beerland
    mode: lowlatency
    governor: performance

  # ── Other schedulers (auto mode only) ──
  - name: layered_auto
    scheduler: layered
    mode: auto
    governor: performance

  - name: nest_auto
    scheduler: nest
    mode: auto
    governor: performance

  - name: simple_auto
    scheduler: simple
    mode: auto
    governor: performance

  - name: qmap_auto
    scheduler: qmap
    mode: auto
    governor: performance
