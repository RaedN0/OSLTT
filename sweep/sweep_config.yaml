# OSLTT Sweep Configuration — default template
# scxctl modes: auto, gaming, lowlatency, powersave, server

game: kovaaks
device: /dev/ttyACM0
repeats: 3

osltt:
  shots: 100
  delay_ms: 10
  move_px: 100
  window_ms: 20
  threshold: 0        # 0 = auto

# Fields per run:
#   name:       Label
#   scheduler:  Name without scx_ prefix (lavd, bpfland, rusty, etc.)
#               'none' = stop scx, revert to kernel EEVDF
#   mode:       scxctl mode (auto, gaming, lowlatency, powersave, server)
#   args:       Extra CLI args (comma-separated, optional)
#   governor:   CPU governor (optional)

runs:
  - name: eevdf_default
    scheduler: none
    governor: performance

  - name: lavd_lowlatency
    scheduler: lavd
    mode: lowlatency
    governor: performance

  - name: bpfland_gaming
    scheduler: bpfland
    mode: gaming
    governor: performance

  - name: bpfland_lowlatency
    scheduler: bpfland
    mode: lowlatency
    governor: performance

  - name: rusty_lowlatency
    scheduler: rusty
    mode: lowlatency
    governor: performance

  - name: eevdf_powersave
    scheduler: none
    governor: powersave

# Example with extra args:
#   - name: lavd_performance_custom
#     scheduler: lavd
#     mode: auto
#     args: "--performance"
#     governor: performance
